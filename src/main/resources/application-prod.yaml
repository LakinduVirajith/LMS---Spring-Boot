spring:
  jpa:
    hibernate:
      # Database schema strategy for production
      ddl-auto: update

  security:
    # Publicly accessible endpoints (production)
    whitelist:
      - /api/public/**
      - /actuator/**
      - /actuator/health
      - /actuator/info
      - /actuator/metrics

    public-endpoints: ${PUBLIC_ENDPOINTS}

# Logging configuration
logging:
  level:
    # Log only errors in production
    root: ERROR

  # Minimal log format for production
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n'

# Actuator configuration
management:
  endpoints:
    web:
      # Expose only necessary actuator endpoints in prod
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: never # Do not reveal details publicly
